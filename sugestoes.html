<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rota Segura · Caixa de Sugestões</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ─── Tokens Unificados ───────────────────────────────────── */
    :root {
      --bg:          #f0f5f2;
      --surface:     #ffffff;
      --surface-2:   #f7faf8;
      --sidebar-bg:  rgba(255,255,255,0.82);
      --border:      rgba(61,160,100,0.18);
      --border-strong: rgba(61,160,100,0.32);
      --primary:     #2b7a57;
      --primary-mid: #3dac76;
      --primary-light: rgba(43,122,87,0.09);
      --mint:        #d9fced;
      --sky:         #abd2fa;
      --text:        #1a2e24;
      --text-sub:    #5c7466;
      --text-muted:  #92a89c;
      --red:         #e05252;
      --amber:       #f0a843;
      --radius-sm:   8px;
      --radius-md:   14px;
      --radius-lg:   20px;
      --shadow:      0 2px 16px rgba(43,122,87,0.07);
      --shadow-md:   0 4px 24px rgba(43,122,87,0.10);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; }

    /* Blobs Ambientais */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    body::before { width: 520px; height: 520px; background: rgba(61,172,118,0.07); top: -160px; right: -140px; }
    body::after { width: 380px; height: 380px; background: rgba(171,210,250,0.1); bottom: -100px; left: 60px; }

    /* ─── Sidebar Glassmorphism ───────────────────────────────── */
    .sidebar {
      width: 240px; min-height: 100vh; background: var(--sidebar-bg);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-right: 1px solid var(--border); padding: 24px 14px;
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50;
      transition: transform 0.3s ease;
    }
    .sb-dots { display: flex; gap: 6px; margin-bottom: 20px; }
    .sb-dot  { width: 10px; height: 10px; border-radius: 50%; }
    .sb-dot:nth-child(1) { background: #ff5f57; }
    .sb-dot:nth-child(2) { background: #febc2e; }
    .sb-dot:nth-child(3) { background: #28c840; }

    .sb-brand { display: flex; align-items: center; gap: 9px; padding: 0 6px; margin-bottom: 32px; }
    .sb-brand-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); background: var(--primary); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1rem; flex-shrink: 0; }
    .sb-brand-name { font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1rem; color: var(--primary); line-height: 1.2; }
    .sb-brand-sub { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.5px; }

    .sb-section-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; padding: 0 10px; margin-bottom: 8px; }
    .sb-nav { display: flex; flex-direction: column; gap: 3px; }
    .sb-item { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: var(--radius-md); color: var(--text-sub); font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.18s ease; position: relative; }
    .sb-item i { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
    .sb-item:hover { background: var(--primary-light); color: var(--primary); }
    .sb-item.active { background: var(--primary-light); color: var(--primary); font-weight: 700; }
    .sb-item.active::before { content: ''; position: absolute; left: -14px; top: 20%; height: 60%; width: 4px; background: var(--primary); border-radius: 0 3px 3px 0; }
    .sb-divider { height: 1px; background: var(--border); margin: 14px 6px; }
    .sb-footer { margin-top: auto; }
    .btn-logout { display: flex; align-items: center; gap: 12px; width: 100%; padding: 10px 12px; border-radius: var(--radius-md); background: none; border: none; color: var(--red); font-family: 'Nunito', sans-serif; font-size: 0.84rem; font-weight: 700; cursor: pointer; transition: background 0.18s; }
    .btn-logout:hover { background: rgba(224,82,82,0.08); }

    /* ─── Mobile Elements ─────────────────────────────────────── */
    .mobile-topbar { display: none; position: fixed; top: 0; left: 0; right: 0; height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 60; align-items: center; justify-content: space-between; padding: 0 16px; }
    .mobile-logo { font-family: 'Quicksand', sans-serif; font-weight: 700; color: var(--primary); font-size: 1rem; }
    .btn-menu { background: none; border: none; color: var(--primary); font-size: 1.3rem; cursor: pointer; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 40; }
    .overlay.open { display: block; }

    /* ─── Content Area ────────────────────────────────────────── */
    .content { margin-left: 240px; flex: 1; padding: 32px 32px 48px; position: relative; z-index: 1; max-width: 1200px; }

    /* Topbar */
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .topbar-left h1 { font-family: 'Quicksand', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .topbar-meta { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-muted); }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--primary-mid); display: inline-block; animation: pulse 2s ease-in-out infinite; }

    .profile-chip { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 8px 14px; box-shadow: var(--shadow); }
    .profile-chip-info { text-align: right; }
    .profile-chip-info span { display: block; font-size: 0.85rem; font-weight: 700; color: var(--text); }
    .profile-chip-info small { font-size: 0.68rem; color: var(--primary); font-weight: 600; }
    .profile-avatar { width: 36px; height: 36px; border-radius: 10px; background: var(--primary-light); border: 1.5px solid var(--border-strong); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 0.95rem; }

    /* Layout da Grade */
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow); height: fit-content; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid var(--surface-2); padding-bottom: 12px; }
    .panel-header h3 { font-family: 'Quicksand', sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .panel-header h3 i { color: var(--primary); }

    /* Formulário */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; }
    .form-control { width: 100%; background: var(--surface-2); border: 1px solid var(--border-strong); border-radius: var(--radius-md); padding: 12px; font-family: 'Nunito', sans-serif; font-size: 0.9rem; color: var(--text); outline: none; transition: border-color 0.2s; }
    .form-control:focus { border-color: var(--primary-mid); }
    textarea.form-control { resize: none; min-height: 120px; }
    
    .btn-submit { background: var(--primary); color: #fff; border: none; border-radius: var(--radius-md); padding: 12px 24px; font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .btn-submit:hover { background: var(--primary-mid); }

    /* Listagem de Sugestões */
    .suggestion-list { display: flex; flex-direction: column; gap: 14px; max-height: 520px; overflow-y: auto; padding-right: 4px; }
    .suggestion-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; position: relative; display: flex; flex-direction: column; gap: 8px; }
    .suggestion-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .suggestion-author { font-family: 'Quicksand', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .suggestion-date { font-size: 0.72rem; color: var(--text-muted); }
    .suggestion-text { font-size: 0.88rem; color: var(--text-sub); line-height: 1.5; word-break: break-word; }
    
    .btn-delete { background: none; border: none; color: var(--red); cursor: pointer; font-size: 0.9rem; padding: 4px; border-radius: var(--radius-sm); transition: background 0.2s; display: none; }
    .btn-delete:hover { background: rgba(224,82,82,0.1); }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 0.85rem; }

    /* Animations */
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.45s ease forwards; }

    /* Responsive */
    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    @media (max-width: 800px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 40px rgba(0,0,0,0.12); }
      .content { margin-left: 0; padding: 80px 16px 40px; }
      .mobile-topbar { display: flex; }
      .topbar { display: none; }
    }
  </style>
</head>
<body>

<div class="mobile-topbar">
  <span class="mobile-logo"><i class="fa-solid fa-location-dot" style="color:var(--primary);margin-right:6px;"></i>Rota Segura</span>
  <button class="btn-menu" id="btnMenuOpen" aria-label="Abrir menu"><i class="fa-solid fa-bars"></i></button>
</div>

<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sb-dots"><div class="sb-dot"></div><div class="sb-dot"></div><div class="sb-dot"></div></div>
  <div class="sb-brand">
    <div class="sb-brand-icon"><i class="fa-solid fa-location-dot"></i></div>
    <div><div class="sb-brand-name">Rota Segura</div><div class="sb-brand-sub">Portal do Aluno</div></div>
  </div>

  <div class="sb-section-label">Navegação</div>
  <nav class="sb-nav">
    <a href="dashboard-user.html" class="sb-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="aluno.html" class="sb-item"><i class="fa-solid fa-user-graduate"></i><span>Aluno</span></a>
    <a href="sugestoes.html" class="sb-item active"><i class="fa-solid fa-comment-dots"></i><span>Sugestões</span></a>
    <a href="alertas-user.html" class="sb-item"><i class="fa-solid fa-bell"></i><span>Alertas</span></a>
    <div class="sb-divider"></div>
    <a href="https://t.me/castlesec" target="_blank" rel="noopener" class="sb-item"><i class="fa-brands fa-telegram"></i><span>Contact Us</span></a>
  </nav>

  <div class="sb-footer">
    <div class="sb-divider"></div>
    <button id="logoutBtn" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i>Sair do portal</button>
  </div>
</aside>

<main class="content">
  <header class="topbar">
    <div class="topbar-left">
      <h1>Caixa de Sugestões</h1>
      <div class="topbar-meta"><span class="live-dot"></span>ouvidoria_compartilhada · Guaíra - PR</div>
    </div>
    <div class="profile-chip">
      <div class="profile-chip-info">
        <span id="Username">Carregando...</span>
        <small id="UserRole">Verificando...</small>
      </div>
      <div class="profile-avatar"><i class="fa-solid fa-user"></i></div>
    </div>
  </header>

  <div class="main-grid fade-up">
    <section class="panel">
      <div class="panel-header">
        <h3><i class="fa-solid fa-pen-to-square"></i> Enviar Feedback</h3>
      </div>
      <form id="suggestionForm">
        <div class="form-group">
          <label for="inputName">Seu Nome (Opcional)</label>
          <input type="text" id="inputName" class="form-control" placeholder="Deixe em branco para enviar como anônimo">
        </div>
        <div class="form-group">
          <label for="inputText">Sua Sugestão ou Crítica</label>
          <textarea id="inputText" class="form-control" placeholder="Escreva aqui sua mensagem para a central ou melhorias no transporte..." required></textarea>
        </div>
        <button type="submit" class="btn-submit"><i class="fa-solid fa-paper-plane"></i> Enviar Mensagem</button>
      </form>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h3><i class="fa-solid fa-comments"></i> Mural do Sistema</h3>
      </div>
      <div class="suggestion-list" id="suggestionContainer">
        <div class="empty-state">Buscando feedbacks e registros...</div>
      </div>
    </section>
  </div>
</main>

<script>
  (() => {
    const SUPABASE_URL      = "https://bfeaukfyvgvkkrjjofbk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmZWF1a2Z5dmd2a2tyampvZmJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NDcxNzYsImV4cCI6MjA5NDEyMzE3Nn0.k2sD3NT_1yysDyNdQy2e0V4ro4kYBC4G7jjzTS3jtZU";
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let isAdmin = false;

    // Menu Mobile
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    document.getElementById('btnMenuOpen').addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('open'); });
    overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); });

    // Sincronização e Checagem de Sessão
    async function checkSession() {
      try {
        const { data: { user }, error: authError } = await db.auth.getUser();
        if (authError || !user) { window.location.href = 'login-user.html'; return; }

        const { data: profile } = await db
          .from('profiles')
          .select('display_name, role')
          .eq('id', user.id)
          .maybeSingle();

        const displayName = profile?.display_name || user.email.split('@')[0];
        const userRole = (profile?.role || 'aluno').toLowerCase();

        document.getElementById('Username').innerText = displayName;

        const roleLabels = { administrador: 'Administrador', aluno: 'Aluno', responsavel: 'Responsável', motorista: 'Motorista' };
        document.getElementById('UserRole').innerText = roleLabels[userRole] || 'Usuário';

        if (userRole === 'administrador') {
          isAdmin = true;
        }

        loadSuggestions();

      } catch (err) {
        console.error("Falha de comunicação de barramento:", err);
      }
    }

    // Carregar Sugestões locais ou remotas
    // (Utilizando localStorage adaptável para manter compatibilidade estrutural imediata)
    function loadSuggestions() {
      const container = document.getElementById('suggestionContainer');
      const localData = JSON.parse(localStorage.getItem('rs_sugestoes') || '[]');

      if (localData.length === 0) {
        container.innerHTML = '<div class="empty-state">Nenhum feedback postado no mural até o momento. Seja o primeiro!</div>';
        return;
      }

      // Ordenar pelas mais recentes
      localData.sort((a, b) => new Date(b.date) - new Date(a.date));

      container.innerHTML = '';
      localData.forEach(item => {
        const dateFormatted = new Date(item.date).toLocaleDateString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        
        container.innerHTML += `
          <div class="suggestion-card" id="card-${item.id}">
            <div class="suggestion-top">
              <div>
                <span class="suggestion-author">${item.author}</span>
                <div class="suggestion-date">${dateFormatted}</div>
              </div>
              <button class="btn-delete" data-id="${item.id}" style="display: ${isAdmin ? 'block' : 'none'};" title="Apagar Sugestão">
                <i class="fa-solid fa-trash-can"></i>
              </button>
            </div>
            <div class="suggestion-text">${item.text}</div>
          </div>
        `;
      });

      // Ativa escuta nos botões de remoção administrativa
      if (isAdmin) {
        document.querySelectorAll('.btn-delete').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const targetId = btn.getAttribute('data-id');
            deleteSuggestion(targetId);
          });
        });
      }
    }

    // Enviar Nova Sugestão
    document.getElementById('suggestionForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const nameInput = document.getElementById('inputName').value.trim();
      const textInput = document.getElementById('inputText').value.trim();

      const authorName = nameInput || "Anônimo";
      const currentList = JSON.parse(localStorage.getItem('rs_sugestoes') || '[]');

      const newSuggestion = {
        id: 'sug_' + Date.now(),
        author: authorName,
        text: textInput,
        date: new Date().toISOString()
      };

      currentList.push(newSuggestion);
      localStorage.setItem('rs_sugestoes', JSON.stringify(currentList));

      document.getElementById('suggestionForm').reset();
      loadSuggestions();
    });

    // Função de Remoção Administrativa
    function deleteSuggestion(id) {
      let currentList = JSON.parse(localStorage.getItem('rs_sugestoes') || '[]');
      currentList = currentList.filter(item => item.id !== id);
      localStorage.setItem('rs_sugestoes', JSON.stringify(currentList));
      loadSuggestions();
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await db.auth.signOut();
      window.location.href = 'login-user.html';
    });

    document.addEventListener('DOMContentLoaded', checkSession);
  })();
</script>
</body>
</html>
