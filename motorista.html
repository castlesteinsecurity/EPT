<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rota Segura | Painel do Motorista</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #11121d;
      --card: #1a1c30;
      --border: #2f3352;
      --primary: #abd2fa;
      --success: #73ffbb;
      --error: #ff6b6b;
      --text: #ffffff;
      --text2: #767993;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
    }

    .mobile-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      width: 100%;
      max-width: 400px;
      padding: 25px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .app-header {
      text-align: center;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }
    .app-header h1 { font-size: 1.4rem; font-weight: 700; color: #fff; }
    .app-header p { font-size: 0.85rem; color: var(--text2); margin-top: 4px; }

    /* Tela de Pareamento Inicial */
    .pairing-screen { display: flex; flex-direction: column; gap: 15px; }
    
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 0.8rem; font-weight: 600; color: var(--primary); text-transform: uppercase; }
    .input-group input, .input-group select {
      background: #11121d;
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      text-align: center;
    }
    .input-group input:focus { border-color: var(--primary); }

    /* Tela de Transmissão Ativa (Cockpit) */
    .cockpit-screen { display: none; flex-direction: column; gap: 20px; text-align: center; }

    .transmission-badge {
      align-self: center;
      background: rgba(115, 255, 187, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    .telemetry-display {
      background: #11121d;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .telemetry-box { display: flex; flex-direction: column; gap: 4px; }
    .telemetry-box small { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; }
    .telemetry-box span { font-size: 1.2rem; font-weight: 700; color: #fff; }

    /* Botões */
    .btn {
      background: var(--primary);
      color: #11121d;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn:hover { opacity: 0.9; }
    .btn-stop { background: var(--error); color: #fff; }

    /* Mensagem de Feedback (Toast Móvel) */
    #statusMessage {
      font-size: 0.85rem;
      text-align: center;
      color: var(--text2);
      min-height: 20px;
    }
  </style>
</head>
<body>

<div class="mobile-container">
  
  <header class="app-header">
    <h1>Rota Segura Fleets</h1>
    <p id="driverWelcome">Identificando motorista corporativo...</p>
  </header>

  <div id="screenPairing" class="pairing-screen">
    <div class="input-group">
      <label>Prefixo do Ônibus</label>
      <select id="busSelect">
        <option value="402">Ônibus 402 - Rota 01</option>
        <option value="305">Ônibus 305 - Rota Rural</option>
      </select>
    </div>

    <div class="input-group">
      <label>Token do Painel CCO</label>
      <input type="number" id="pairingToken" placeholder="Digite os 6 dígitos" max="999999">
    </div>

    <button id="btnStartTrip" class="btn"><i class="fa-solid fa-play"></i> Iniciar Transmissão</button>
  </div>

  <div id="screenCockpit" class="cockpit-screen">
    <div class="transmission-badge">Sinal GPS Conectado</div>
    
    <div class="telemetry-display">
      <div class="telemetry-box" style="grid-column: span 2; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
        <small>Destino Principal</small>
        <span style="color: var(--primary); font-size: 1rem;"><i class="fa-solid fa-school"></i> C. E. Pres. Roosevelt</span>
      </div>
      <div class="telemetry-box">
        <small>Latitude</small>
        <span id="txtLat">---</span>
      </div>
      <div class="telemetry-box">
        <small>Longitude</small>
        <span id="txtLon">---</span>
      </div>
    </div>

    <button id="btnStopTrip" class="btn btn-stop"><i class="fa-solid fa-square"></i> Encerrar Rota</button>
  </div>

  <p id="statusMessage">Aguardando pareamento de hardware.</p>

</div>

<script>
  (() => {
    const SUPABASE_URL = "https://bfeaukfyvgvkkrjjofbk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmZWF1a2Z5dmd2a2tyampvZmJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NDcxNzYsImV4cCI6MjA5NDEyMzE3Nn0.k2sD3NT_1yysDyNdQy2e0V4ro4kYBC4G7jjzTS3jtZU";
    
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let geoWatchId = null;
    let currentBus = null;

    async function checkDriverSession() {
      const { data: { user }, error } = await db.auth.getUser();
      if (error || !user) { window.location.href = 'login.html'; return; }
      
      document.getElementById('driverWelcome').innerText = `Motorista: ${user.email.split('@')[0]}`;

      // MEMÓRIA RESILIENTE: Verifica se o motorista já estava transmitindo antes da página reiniciar
      const savedBus = localStorage.getItem('active_bus_drive');
      if (savedBus) {
        currentBus = savedBus;
        document.getElementById('screenPairing').style.display = 'none';
        document.getElementById('screenCockpit').style.display = 'flex';
        updateStatus("Reconectando transmissão interrompida...", "success");
        startGpsTracking();
      }
    }

    function startGpsTracking() {
      if (!("geolocation" in navigator)) {
        updateStatus("Seu celular não possui suporte a GPS.", "error");
        return;
      }

      const geoOptions = { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 };

      geoWatchId = navigator.geolocation.watchPosition(async (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        document.getElementById('txtLat').innerText = lat.toFixed(5);
        document.getElementById('txtLon').innerText = lon.toFixed(5);
        updateStatus("Sinal ativo. Transmitindo dados.", "success");

        try {
          // Faz upload mantendo os dados customizados salvos pelo administrador intactos
          await db.from('bus_positions').upsert({
            bus_id: currentBus,
            latitude: lat,
            longitude: lon,
            updated_at: new Date().toISOString()
          });
        } catch (dbErr) {
          console.error("Erro na transmissão:", dbErr);
        }

      }, (err) => {
        updateStatus("Aguardando sinal estável de GPS...", "error");
      }, geoOptions);
    }

    function stopGpsTracking() {
      if (geoWatchId) { navigator.geolocation.clearWatch(geoWatchId); geoWatchId = null; }
      localStorage.removeItem('active_bus_drive');
    }

    document.getElementById('btnStartTrip').addEventListener('click', () => {
      const tokenInput = document.getElementById('pairingToken').value.trim();
      currentBus = document.getElementById('busSelect').value;

      if (tokenInput.length < 6) {
        updateStatus("Insira o Token de 6 dígitos gerado no CCO.", "error");
        return;
      }

      // Salva o prefixo no storage para blindar contra recarregamentos de página
      localStorage.setItem('active_bus_drive', currentBus);

      document.getElementById('screenPairing').style.display = 'none';
      document.getElementById('screenCockpit').style.display = 'flex';
      
      startGpsTracking();
    });

    document.getElementById('btnStopTrip').addEventListener('click', () => {
      stopGpsTracking();
      document.getElementById('screenCockpit').style.display = 'none';
      document.getElementById('screenPairing').style.display = 'flex';
      document.getElementById('pairingToken').value = "";
      updateStatus("Viagem encerrada. Dispositivo despareado.");
    });

    function updateStatus(msg, type = '') {
      const statusEl = document.getElementById('statusMessage');
      statusEl.innerText = msg;
      if (type === 'error') statusEl.style.color = 'var(--error)';
      else if (type === 'success') statusEl.style.color = 'var(--success)';
      else statusEl.style.color = 'var(--text2)';
    }

    document.addEventListener('DOMContentLoaded', checkDriverSession);
  })();
</script>
</body>
</html>
