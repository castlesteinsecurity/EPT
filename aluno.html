<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rota Segura | Cronograma Escolar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f3f7f4;
      --sidebar-bg: rgba(255, 255, 255, 0.75);
      --card-bg: rgba(255, 255, 255, 0.85);
      --border: rgba(115, 255, 187, 0.35);
      --border-hover: rgba(115, 255, 187, 0.6);
      --primary: #2b7a57;
      --accent: #5cd699;
      --text-main: #1e2925;
      --text-sub: #5c6f67;
      --mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; }

    .dashboard-container { display: flex; width: 100%; min-height: 100vh; }

    /* Sidebar Glassmorphism */
    .sidebar {
      width: 260px; background: var(--sidebar-bg); backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px); border-right: 1px solid var(--border);
      padding: 24px 16px; display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-header { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; padding-left: 8px; }
    .sidebar-header .dots { display: flex; gap: 6px; margin-bottom: 8px; }
    .sidebar-header .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff5f56; }
    .sidebar-header .dot:nth-child(2) { background: #ffbd2e; }
    .sidebar-header .dot:nth-child(3) { background: #27c93f; }
    .logo-text { font-family: var(--mono); font-weight: 700; color: var(--primary); font-size: 1.1rem; }

    .menu-label { font-family: var(--mono); font-size: 0.68rem; color: var(--text-sub); letter-spacing: 1.5px; text-transform: uppercase; margin: 0 0 12px 10px; }
    .menu-nav { display: flex; flex-direction: column; gap: 6px; }
    .menu-item {
      display: flex; align-items: center; gap: 14px; padding: 12px 14px; border-radius: 12px;
      color: var(--text-sub); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: all 0.2s;
    }
    .menu-item i { font-size: 1.05rem; width: 20px; text-align: center; }
    .menu-item:hover { background: rgba(115, 255, 187, 0.15); color: var(--primary); }
    .menu-item.active { background: rgba(43, 122, 87, 0.08); color: var(--primary); font-weight: 700; }

    .sidebar-footer { margin-top: auto; padding: 10px; border-top: 1px solid rgba(0,0,0,0.04); }
    .btn-logout { width: 100%; display: flex; align-items: center; gap: 12px; background: none; border: none; color: #d9534f; font-family: var(--mono); font-size: 0.78rem; font-weight: 700; cursor: pointer; padding: 10px; }

    /* Área de Conteúdo */
    .main-content { flex-grow: 1; padding: 32px; display: flex; flex-direction: column; gap: 24px; max-width: 1400px; margin: 0 auto; width: 100%; }

    .topbar { display: flex; justify-content: space-between; align-items: center; }
    .topbar-title h1 { font-size: 1.6rem; color: var(--text-main); font-weight: 700; }
    .topbar-sub { font-family: var(--mono); font-size: 0.75rem; color: var(--text-sub); margin-top: 4px; }

    .profile-card { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; }
    .profile-info { text-align: right; }
    .profile-info span { font-size: 0.85rem; font-weight: 600; color: var(--text-main); }
    .profile-info small { font-family: var(--mono); font-size: 0.7rem; color: var(--primary); display: block; }
    .avatar-box { width: 38px; height: 38px; border-radius: 10px; background: rgba(43, 122, 87, 0.1); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--primary); }

    /* Seletor Administrativo Híbrido */
    .admin-box { background: rgba(43, 122, 87, 0.03); border: 1px dashed var(--primary); border-radius: 16px; padding: 18px; display: none; flex-direction: column; gap: 10px; }
    .admin-box h3 { font-family: var(--mono); font-size: 0.75rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
    .admin-box select { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text-main); font-size: 0.88rem; width: 100%; outline: none; }

    /* Bloco do Cronograma */
    .panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 24px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.02); }
    .panel-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; border-bottom: 1px solid rgba(0,0,0,0.04); padding-bottom: 14px; }
    .panel-header h3 { font-size: 1.1rem; font-weight: 700; color: var(--text-main); }
    .panel-header i { color: var(--primary); font-size: 1.2rem; }

    /* Grade Horária Estilizada */
    .timeline { display: flex; flex-direction: column; gap: 14px; }
    .timeline-item { background: #fff; border: 1px solid rgba(0,0,0,0.03); border-left: 4px solid var(--primary); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .timeline-top { display: flex; justify-content: space-between; align-items: center; }
    .materia-title { font-size: 0.95rem; font-weight: 700; color: var(--text-main); }
    .time-badge { font-family: var(--mono); font-size: 0.72rem; color: var(--primary); background: rgba(115, 255, 187, 0.15); padding: 3px 8px; border-radius: 6px; font-weight: 600; }
    
    .timeline-obs { font-size: 0.8rem; color: var(--text-sub); background: #f8faf9; border: 1px solid rgba(0,0,0,0.02); padding: 10px 14px; border-radius: 8px; display: flex; align-items: center; gap: 8px; }
    .timeline-obs i { color: #ffbc42; }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-sub); font-size: 0.85rem; font-family: var(--mono); }

    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 16px; }
      .sidebar-header { margin-bottom: 16px; }
      .menu-label { display: none; }
      .menu-nav { flex-direction: row; justify-content: space-around; }
      .menu-item span { display: none; }
      .sidebar-footer { display: none; }
      .main-content { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="dashboard-container">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div>
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <span class="logo-text">Rota Segura</span>
      </div>
    </div>

    <div class="menu-label">Navegação</div>
    <nav class="menu-nav">
      <a href="dashboard-user.html" class="menu-item" id="btnHomeLink"><i class="fa-solid fa-house"></i><span>Home</span></a>
      <a href="aluno.html" class="menu-item active"><i class="fa-solid fa-user-graduate"></i><span>Aluno</span></a>
      <a href="sugestoes.html" class="menu-item"><i class="fa-solid fa-comment-dots"></i><span>Sugestões</span></a>
      <a href="alertas.html" class="menu-item"><i class="fa-solid fa-bell"></i><span>Alertas</span></a>
    </nav>

    <div class="sidebar-footer">
      <button id="logoutBtn" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i>Sair Portal</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title">
        <h1>Diário de Bordo & Grade</h1>
        <div class="topbar-sub" id="subHeaderText">Sincronizando ambiente escolar...</div>
      </div>

      <div class="profile-card">
        <div class="profile-info">
          <span id="Username">Carregando...</span>
          <small id="UserRole">Verificando...</small>
        </div>
        <div class="avatar-box"><i class="fa-solid fa-user"></i></div>
      </div>
    </header>

    <section class="admin-box" id="adminControlBox">
      <h3><i class="fa-solid fa-graduation-cap"></i> Auditoria de Alunos (Modo Admin)</h3>
      <select id="adminStudentSelect">
        <option value="">-- Escolha um discente para puxar a agenda --</option>
      </select>
    </section>

    <section class="panel">
      <div class="panel-header">
        <i class="fa-solid fa-calendar-day"></i>
        <h3 id="panelTitle">Aulas e Cronogramas</h3>
      </div>

      <div class="timeline" id="agendaTimeline">
        <div class="empty-state">Buscando registros operacionais ativos...</div>
      </div>
    </section>
  </main>
</div>

<script>
  (() => {
    const SUPABASE_URL      = "https://bfeaukfyvgvkkrjjofbk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmZWF1a2Z5dmd2a2tyampvZmJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NDcxNzYsImV4cCI6MjA5NDEyMzE3Nn0.k2sD3NT_1yysDyNdQy2e0V4ro4kYBC4G7jjzTS3jtZU";
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let alocacoes = JSON.parse(localStorage.getItem('rs_alocacoes') || '[]');
    let agenda    = JSON.parse(localStorage.getItem('rs_agenda_aulas') || '[]');

    async function checkSession() {
      try {
        const { data: { user }, error: authError } = await db.auth.getUser();
        if (authError || !user) { window.location.href = "login.html"; return; }

        const { data: profile } = await db
          .from('profiles')
          .select('display_name, role')
          .eq('id', user.id)
          .maybeSingle();

        const userRole = (profile?.role || 'aluno').toLowerCase();
        const displayName = profile?.display_name || user.email.split('@')[0];

        document.getElementById('Username').innerText = displayName;
        
        const roleLabels = {
          administrador: 'Administrador',
          aluno:         'Aluno',
          responsavel:   'Responsável',
          motorista:     'Motorista'
        };
        document.getElementById('UserRole').innerText = roleLabels[userRole] || 'Usuário';

        if (userRole === 'administrador') {
            document.getElementById('subHeaderText').innerText = "modo_auditoria_geral";
            // Mantém o link do Administrador apontando para o painel principal root
            document.getElementById('btnHomeLink').setAttribute('href', 'dashboard-user.html');
            activateAdminView();
}       else {
            document.getElementById('subHeaderText').innerText = `grade_horaria_individual`;
            // Garante explicitamente que Alunos e Responsáveis voltarão para o dashboard-user.html
            document.getElementById('btnHomeLink').setAttribute('href', 'dashboard-user.html');
            renderStudentSchedule(user.id);
        }

      } catch (err) {
        console.error("Inconsistência de barramento:", err);
      }
    }

    async function activateAdminView() {
      const adminBox = document.getElementById('adminControlBox');
      const select = document.getElementById('adminStudentSelect');
      if (adminBox) adminBox.style.display = "flex";

      // Puxa todos os alunos do banco para alimentar o filtro do admin
      const { data: students } = await db
        .from('profiles')
        .select('id, display_name')
        .eq('role', 'aluno')
        .order('display_name', { ascending: true });

      students?.forEach(s => {
        select.innerHTML += `<option value="${s.id}">${s.display_name}</option>`;
      });

      select.addEventListener('change', () => {
        if (select.value) {
          renderStudentSchedule(select.value);
        } else {
          document.getElementById('agendaTimeline').innerHTML = '<div class="empty-state">Selecione um aluno acima para verificar o cronograma da turma.</div>';
        }
      });

      document.getElementById('agendaTimeline').innerHTML = '<div class="empty-state">Aguardando definição de filtro de estudante...</div>';
    }

    function renderStudentSchedule(studentId) {
      const timeline = document.getElementById('agendaTimeline');
      const panelTitle = document.getElementById('panelTitle');

      // Cruza dados com o barramento do localstorage
      const alocacao = alocacoes.find(a => a.aluno_id === studentId);

      if (!alocacao) {
        panelTitle.innerText = "Turma não identificada";
        timeline.innerHTML = '<div class="empty-state"><i class="fa-solid fa-circle-exclamation" style="color: #ffbc42; font-size: 1.4rem;"></i><br><br>Este estudante ainda não foi alocado a nenhuma turma pela central de segurança.</div>';
        return;
      }

      const turmaDoAluno = alocacao.turma;
      panelTitle.innerText = `Horários e Aulas — ${turmaDoAluno}`;

      const aulasFiltradas = agenda.filter(a => a.turma === turmaDoAluno);

      if (aulasFiltradas.length === 0) {
        timeline.innerHTML = '<div class="empty-state">Nenhuma aula ou alteração de grade postada para hoje nesta turma.</div>';
        return;
      }

      timeline.innerHTML = '';
      aulasFiltradas.forEach(aula => {
        timeline.innerHTML += `
          <div class="timeline-item">
            <div class="timeline-top">
              <span class="materia-title">${aula.materia}</span>
              <span class="time-badge">${aula.horario}</span>
            </div>
            ${aula.obs ? `
              <div class="timeline-obs">
                <i class="fa-solid fa-circle-info"></i>
                <span>${aula.obs}</span>
              </div>
            ` : ''}
          </div>
        `;
      });
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await db.auth.signOut(); window.location.href = "login.html";
    });

    document.addEventListener('DOMContentLoaded', checkSession);
  })();
</script>
</body>
</html>
