<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rota Segura · Cadastro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-page:       #1e2035;
            --bg-card:       #252841;
            --bg-right:      #1c1e36;
            --bg-input:      #2d3154;
            --bg-input-focus:#333866;
            --border:        #3a3e5e;
            --border-bright: #4a4f7a;
            --mint:          #d9fced;
            --mint-glow:     rgba(217, 252, 237, 0.18);
            --sky:           #abd2fa;
            --text:          #ffffff;
            --text-dim:      #a0a3c4;
            --red:           #ff6b6b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background: var(--bg-page);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(171, 210, 250, 0.06) 0%, transparent 55%),
                radial-gradient(circle at 80% 75%, rgba(217, 252, 237, 0.06) 0%, transparent 55%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        a { color: inherit; }

        .card-shell {
            position: relative;
            width: 92vw;
            max-width: 1120px;
            height: 84vh;
            max-height: 640px;
            border-radius: 28px;
            border: 1px solid var(--border-bright);
            overflow: hidden;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.55);
            display: flex;
        }

        /* ── left: form ── */
        .panel-left {
            flex: 1;
            background: var(--bg-card);
            padding: 44px 56px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 9px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-dim);
            margin-bottom: 28px;
            letter-spacing: 0.5px;
        }
        .brand svg { color: var(--mint); width: 18px; height: 18px; flex-shrink: 0; }

        .panel-left h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .panel-left h1 span { color: var(--mint); }

        .panel-left h2 {
            font-size: 0.92rem;
            color: var(--text-dim);
            font-weight: 400;
            margin-bottom: 32px;
        }
        .panel-left h2 a {
            color: var(--sky);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .panel-left h2 a:hover { border-bottom-color: var(--sky); }

        /* ── inputs ── */
        .input-group { margin-bottom: 14px; }

        .field-label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 7px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .field-label svg { width: 13px; height: 13px; color: var(--mint); }

        .field-wrap {
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            overflow: hidden;
        }
        .field-wrap:focus-within {
            border-color: var(--mint);
            background: var(--bg-input-focus);
            box-shadow: 0 0 0 3px var(--mint-glow);
        }

        .input-group input {
            width: 100%;
            height: 48px;
            background: transparent;
            border: none;
            outline: none;
            padding: 0 20px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 0.96rem;
        }
        .input-group input::placeholder { color: #5a5f82; }

        .btn-register {
            margin-top: 10px;
            width: 100%;
            height: 52px;
            background: var(--mint);
            color: #1a1f3a;
            border: none;
            border-radius: 14px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        }
        .btn-register svg { width: 18px; height: 18px; }
        .btn-register:hover {
            background: var(--sky);
            box-shadow: 0 8px 24px rgba(171, 210, 250, 0.3);
        }
        .btn-register:active { transform: translateY(1px); }
        .btn-register:disabled {
            background: var(--border);
            color: #5a5f82;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .feedback-msg {
            margin-top: 14px;
            font-size: 0.83rem;
            min-height: 1.2em;
            color: var(--text-dim);
            text-align: center;
        }

        /* ── right: illustration ── */
        .panel-right {
            width: 42%;
            flex-shrink: 0;
            background: var(--bg-right);
            border-left: 1px solid var(--border);
            padding: 44px 38px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 26px;
            overflow: hidden;
            position: relative;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(64px);
            pointer-events: none;
        }
        .blob-1 { width: 260px; height: 260px; background: var(--mint); opacity: 0.07; top: -80px; left: -80px; }
        .blob-2 { width: 220px; height: 220px; background: var(--sky); opacity: 0.08; bottom: -60px; right: -60px; }

        /* ID card illustration */
        .id-scene {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 260px;
            display: flex;
            justify-content: center;
        }

        .id-card {
            width: 200px;
            background: #f4fbf8;
            border-radius: 20px;
            padding: 24px 20px 20px;
            text-align: center;
            box-shadow: 0 24px 48px rgba(0,0,0,0.4);
            animation: cardFloat 5s ease-in-out infinite;
            position: relative;
        }

        .id-hole {
            width: 48px;
            height: 7px;
            border-radius: 6px;
            background: rgba(30, 32, 53, 0.1);
            margin: 0 auto 16px;
        }

        .id-logo {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--bg-page);
            margin-bottom: 14px;
            opacity: 0.6;
        }

        .id-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 0 auto 12px;
            background: linear-gradient(135deg, var(--mint), var(--sky));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-page);
        }
        .id-avatar svg { width: 34px; height: 34px; }

        .id-name {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--bg-page);
            margin-bottom: 2px;
        }

        .id-role {
            font-size: 0.7rem;
            color: #8b93b8;
            margin-bottom: 16px;
        }

        .id-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(217, 252, 237, 0.25);
            border: 1px solid rgba(217, 252, 237, 0.5);
            border-radius: 999px;
            padding: 4px 12px;
            font-size: 0.65rem;
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            color: #1a4a2e;
            letter-spacing: 0.5px;
        }
        .id-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #2ecc71;
            box-shadow: 0 0 5px #2ecc71;
        }

        /* floating sparkles */
        .sparkle {
            position: absolute;
            border-radius: 50%;
            background: var(--mint);
            opacity: 0;
            animation: sparkleFloat 3s ease-in-out infinite;
        }
        .sparkle:nth-child(1) { width: 8px; height: 8px; top: -8px; right: 20px; animation-delay: 0s; }
        .sparkle:nth-child(2) { width: 5px; height: 5px; top: 20px; left: -6px; animation-delay: 0.8s; background: var(--sky); }
        .sparkle:nth-child(3) { width: 6px; height: 6px; bottom: 10px; right: -4px; animation-delay: 1.6s; }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50%       { transform: translateY(-10px) rotate(0deg); }
        }

        @keyframes sparkleFloat {
            0%, 100% { opacity: 0; transform: translateY(0) scale(0.8); }
            50%       { opacity: 0.7; transform: translateY(-10px) scale(1.2); }
        }

        /* steps list */
        .steps {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 260px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards;
        }
        .step:nth-child(1) { animation-delay: 0.1s; }
        .step:nth-child(2) { animation-delay: 0.25s; }
        .step:nth-child(3) { animation-delay: 0.4s; }

        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(217, 252, 237, 0.1);
            border: 1.5px solid rgba(217, 252, 237, 0.3);
            color: var(--mint);
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .step-text { display: flex; flex-direction: column; gap: 1px; }
        .step-text strong {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text);
            font-family: 'Quicksand', sans-serif;
        }
        .step-text span { font-size: 0.71rem; color: var(--text-dim); }

        .dev-credit {
            position: absolute;
            bottom: 18px;
            font-size: 0.7rem;
            color: var(--border-bright);
            text-decoration: none;
            transition: color 0.2s;
            z-index: 1;
        }
        .dev-credit:hover { color: var(--text-dim); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 760px) {
            html, body { height: auto; overflow: auto; }
            body { padding: 24px 0; }
            .card-shell { width: 95vw; height: auto; max-height: none; flex-direction: column; border-radius: 20px; }
            .panel-right { width: 100%; border-left: none; border-top: 1px solid var(--border); padding: 32px 28px; }
            .panel-left { padding: 36px 28px; }
        }
    </style>
</head>
<body>

<div class="card-shell">

    <!-- ── LEFT: form ── -->
    <div class="panel-left">

        <div class="brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 21s-7-5.5-7-11a7 7 0 1114 0c0 5.5-7 11-7 11z"/>
                <circle cx="12" cy="10" r="2.4"/>
            </svg>
            Rota Segura
        </div>

        <h1>Crie sua <span>conta</span></h1>
        <h2>Já tem uma conta? <a href="login-user.html">Entre aqui</a></h2>

        <form id="registerForm">
            <div class="input-group">
                <label class="field-label" for="username">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    </svg>
                    Nome de usuário
                </label>
                <div class="field-wrap">
                    <input type="text" id="username" name="username" placeholder="Como quer ser chamado?" minlength="3" required>
                </div>
            </div>

            <div class="input-group">
                <label class="field-label" for="email">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                    </svg>
                    E-mail
                </label>
                <div class="field-wrap">
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="input-group">
                <label class="field-label" for="password">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    Senha
                </label>
                <div class="field-wrap">
                    <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" minlength="6" required>
                </div>
            </div>

            <button class="btn-register" id="btnSubmit" type="submit">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                    <line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
                </svg>
                Criar conta
            </button>
        </form>

        <div id="feedback" class="feedback-msg"></div>
    </div>

    <!-- ── RIGHT: illustration ── -->
    <div class="panel-right">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <div class="id-scene">
            <div class="id-card">
                <span class="sparkle"></span>
                <span class="sparkle"></span>
                <span class="sparkle"></span>
                <div class="id-hole"></div>
                <div class="id-logo">Rota Segura</div>
                <div class="id-avatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.9 3.1-7 7-7s7 3.1 7 7"/>
                    </svg>
                </div>
                <div class="id-name">Novo Membro</div>
                <div class="id-role">Responsável / Aluno</div>
                <div class="id-badge">Acesso liberado</div>
            </div>
        </div>

        <div class="steps">
            <div class="step">
                <span class="step-num">1</span>
                <div class="step-text">
                    <strong>Preencha seus dados</strong>
                    <span>Nome, e-mail e senha</span>
                </div>
            </div>
            <div class="step">
                <span class="step-num">2</span>
                <div class="step-text">
                    <strong>Confirme seu e-mail</strong>
                    <span>Verifique sua caixa de entrada</span>
                </div>
            </div>
            <div class="step">
                <span class="step-num">3</span>
                <div class="step-text">
                    <strong>Acompanhe a rota</strong>
                    <span>Rastreamento em tempo real</span>
                </div>
            </div>
        </div>

        <a class="dev-credit" href="https://github.com/Wormkt" target="_blank" rel="noopener">dev: ParallaxSec</a>
    </div>

</div>

<script>
    (() => {
        const SUPABASE_URL      = "https://bfeaukfyvgvkkrjjofbk.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmZWF1a2Z5dmd2a2tyampvZmJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NDcxNzYsImV4cCI6MjA5NDEyMzE3Nn0.k2sD3NT_1yysDyNdQy2e0V4ro4kYBC4G7jjzTS3jtZU";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form     = document.getElementById('registerForm');
        const feedback = document.getElementById('feedback');
        const btnSubmit = document.getElementById('btnSubmit');

        function showFeedback(type, msg) {
            const colors = { info: 'var(--text-dim)', ok: 'var(--mint)', sky: 'var(--sky)', error: 'var(--red)' };
            feedback.style.color = colors[type] || colors.info;
            feedback.innerText = msg;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btnSubmit.disabled = true;
            showFeedback('info', 'Criando sua conta...');

            const { data, error } = await supabaseClient.auth.signUp({
                email,
                password,
                options: { data: { display_name: username } }
            });

            btnSubmit.disabled = false;

            if (error) {
                showFeedback('error', 'Erro: ' + error.message);
            } else if (data?.session) {
                showFeedback('ok', 'Conta criada! Redirecionando...');
                setTimeout(() => { window.location.href = "dashboard.html"; }, 2000);
            } else {
                showFeedback('sky', 'Quase lá! Verifique seu e-mail para confirmar o cadastro.');
                form.reset();
            }
        });
    })();
</script>
</body>
</html>
