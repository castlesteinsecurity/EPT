<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rota Segura | Vincular Ônibus</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="dashboard.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .section-block { margin-bottom: 30px; }
    .section-label { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .section-label h2 { font-size: 1.1rem; font-weight: 700; }
    
    .driver-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      transition: transform 0.2s, border-color 0.2s;
    }
    .driver-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
    }
    .driver-info h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 4px; }
    .driver-info p { font-size: 0.88rem; color: var(--text2); }
    
    .bus-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .bus-badge.none { background: rgba(255, 107, 107, 0.1); color: #ff6b6b; }
    .bus-badge.assigned { background: rgba(115, 255, 187, 0.1); color: #73ffbb; }

    /* ESTILO DO BOTÃO DE EDIÇÃO AMPLIAÇÃO DO PADDING */
    .btn-edit-bus {
      background: #d9fced;
      color: #1a1f3a;
      border: none;
      border-radius: 10px;
      padding: 12px 22px; /* Padding maior e mais confortável */
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-edit-bus:hover {
      background: #abd2fa;
      transform: translateY(-1px);
    }
    .btn-edit-bus:active {
      transform: translateY(0);
    }

    /* Estilos do Modal de Edição */
    .modal-driver-header { margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .modal-driver-header h4 { font-size: 1.1rem; color: var(--text); }
    .modal-driver-header p { font-size: 0.85rem; color: var(--text2); }

    #toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--card);
      border: 1px solid var(--border); border-radius: 14px; padding: 14px 20px;
      font-size: 0.85rem; display: flex; align-items: center; gap: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,.4); z-index: 99999;
      transform: translateY(20px); opacity: 0; transition: transform .25s, opacity .25s; pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: #73ffbb; }
    #toast.success i { color: #73ffbb; }
    #toast.error { border-color: #ff7d7d; }
    #toast.error i { color: #ff7d7d; }
  </style>
</head>
<body>

<div class="dashboard">

  <aside class="sidebar">
    <div class="logo"><span>Rota Segura</span></div>
    <nav class="menu">
      <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i><span>Analytics</span></a>
      <a href="usuarios.html"><i class="fa-solid fa-user-graduate"></i><span>Gestão de Usuários</span></a>
      <a href="onibus.html" class="active"><i class="fa-solid fa-bus"></i><span>Ônibus</span></a>
      <a href="rotas.html"><i class="fa-solid fa-route"></i><span>Rotas</span></a>
      <a href="alertas.html"><i class="fa-solid fa-triangle-exclamation"></i><span>Alertas</span></a>
      <a href="mapa.html"><i class="fa-solid fa-map-location-dot"></i><span>Mapa de Guaíra</span></a>
      <button id="logoutBtn" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i><span>Sair do Sistema</span></button>
    </nav>
    <div class="sidebar-footer">Desenvolvido por <b>CastlesteinSecurity</b></div>
  </aside>

  <main class="content">
    <header class="topbar">
      <div>
        <h1>Gestão de Frota</h1>
        <p>Vincule e edite os ônibus de cada motorista</p>
      </div>
      <div class="profile">
        <div class="profile-text"><span id="Username">Buscando...</span><small>Administrador</small></div>
        <div class="avatar"></div>
      </div>
    </header>

    <div class="section-block">
      <div class="section-label">
        <i class="fa-solid fa-id-card" style="color: var(--primary);"></i>
        <h2>Lista de Motoristas Ativos</h2>
      </div>

      <div id="driversContainer">
        <p style="color: var(--text2);"><i class="fa-solid fa-spinner fa-spin"></i> Carregando motoristas...</p>
      </div>
    </div>
  </main>
</div>

<div id="busModal" class="modal" role="dialog" aria-modal="true">
  <div class="modal-content">
    <div class="modal-driver-header">
      <h3 style="margin-bottom: 4px;">Configurar Ônibus</h3>
      <h4 id="modalDriverName">—</h4>
      <p id="modalDriverEmail">—</p>
    </div>

    <input type="hidden" id="modalDriverId">

    <form id="busForm">
      <div class="input-box" style="margin-bottom: 14px;">
        <label>Placa do Veículo</label>
        <input type="text" id="busPlate" placeholder="ABC-1234" required>
      </div>

      <div class="input-box" style="margin-bottom: 14px;">
        <label>Modelo do Ônibus (E Capacidade em Litros)</label>
        <input type="text" id="busModel" placeholder="Mercedes-Benz OF-1721 (300L)" required>
      </div>

      <div class="input-box" style="margin-bottom: 14px;">
        <label>Numeração / Prefixo do Ônibus</label>
        <input type="text" id="busEnumeration" placeholder="Ex: Carro 402" required>
      </div>

      <div class="input-box" style="margin-bottom: 20px;">
        <label>Apólice de Seguro <small style="color: var(--text2); font-weight: normal;">(Opcional)</small></label>
        <input type="text" id="busPolicy" placeholder="Nº da Apólice ou Seguradora">
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-cancel" id="btnCancelModal">Cancelar</button>
        <button type="submit" class="btn-save" id="btnSaveModal">Salvar Ônibus</button>
      </div>
    </form>
  </div>
</div>

<div id="toast"><i id="toastIcon"></i><span id="toastMsg"></span></div>

<script>
  (() => {
    const SUPABASE_URL = "https://bfeaukfyvgvkkrjjofbk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmZWF1a2Z5dmd2a2tyampvZmJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NDcxNzYsImV4cCI6MjA5NDEyMzE3Nn0.k2sD3NT_1yysDyNdQy2e0V4ro4kYBC4G7jjzTS3jtZU";

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* ── VERIFICAÇÃO DE SESSÃO ── */
    async function checkSession() {
      const { data: { user }, error: authError } = await db.auth.getUser();
      if (authError || !user) { window.location.href = 'login.html'; return; }

      const { data: profile } = await db.from('profiles').select('display_name, role').eq('id', user.id).maybeSingle();
      if (!profile || profile.role?.toLowerCase() !== 'administrador') {
        alert('Acesso restrito a administradores.');
        window.location.href = 'dashboard.html';
        return;
      }
      document.getElementById('Username').innerText = profile.display_name || user.email.split('@')[0];
      fetchDriversAndBuses();
    }

    /* ── BUSCAR MOTORISTAS E ÔNIBUS ── */
    async function fetchDriversAndBuses() {
      const container = document.getElementById('driversContainer');

      const { data: drivers, error: errDrivers } = await db
        .from('profiles')
        .select('id, display_name, email')
        .eq('role', 'motorista')
        .order('display_name');

      if (errDrivers) {
        container.innerHTML = `<p style="color: #ff7d7d;">Erro ao carregar motoristas.</p>`;
        return;
      }

      if (!drivers.length) {
        container.innerHTML = `<p style="color: var(--text2);">Nenhum motorista cadastrado no sistema.</p>`;
        return;
      }

      const { data: buses } = await db.from('buses').select('*');

      const busMap = {};
      (buses || []).forEach(b => { busMap[b.driver_id] = b; });

      container.innerHTML = drivers.map(d => {
        const bus = busMap[d.id];
        const hasBus = !!bus;
        
        return `
          <div class="driver-card">
            <div class="driver-info">
              <h3>${escHtml(d.display_name || 'Sem nome')}</h3>
              <p><i class="fa-solid fa-envelope"></i> ${escHtml(d.email)}</p>
              ${hasBus 
                ? `<span class="bus-badge assigned"><i class="fa-solid fa-bus"></i> ${escHtml(bus.model)} | Placa: ${escHtml(bus.plate)} | N° ${escHtml(bus.enumeration)}</span>`
                : `<span class="bus-badge none"><i class="fa-solid fa-triangle-exclamation"></i> Sem ônibus vinculado</span>`
              }
            </div>
            <button class="btn-edit-bus" 
              data-id="${escHtml(d.id)}"
              data-name="${escHtml(d.display_name)}"
              data-email="${escHtml(d.email)}"
              data-plate="${hasBus ? escHtml(bus.plate) : ''}"
              data-model="${hasBus ? escHtml(bus.model) : ''}"
              data-enum="${hasBus ? escHtml(bus.enumeration) : ''}"
              data-policy="${hasBus ? escHtml(bus.policy) : ''}">
              <i class="fa-solid fa-bus-simple"></i> Editar Ônibus
            </button>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.btn-edit-bus').forEach(btn => {
        btn.addEventListener('click', () => openModal(btn.dataset));
      });
    }

    /* ── GERENCIAMENTO DO MODAL ── */
    const modal = document.getElementById('busModal');
    
    function openModal(data) {
      document.getElementById('modalDriverId').value = data.id;
      document.getElementById('modalDriverName').textContent = data.name;
      document.getElementById('modalDriverEmail').textContent = data.email;
      
      document.getElementById('busPlate').value = data.plate;
      document.getElementById('busModel').value = data.model;
      document.getElementById('busEnumeration').value = data.enum;
      document.getElementById('busPolicy').value = data.policy;

      modal.style.display = 'flex';
    }

    function closeModal() { modal.style.display = 'none'; }
    document.getElementById('btnCancelModal').addEventListener('click', closeModal);

    /* ── SALVAR OU ATUALIZAR ÔNIBUS ── */
    document.getElementById('busForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const driverId = document.getElementById('modalDriverId').value;
      const plate = document.getElementById('busPlate').value.trim();
      const model = document.getElementById('busModel').value.trim();
      const enumeration = document.getElementById('busEnumeration').value.trim();
      const policy = document.getElementById('busPolicy').value.trim() || null;

      const btnSave = document.getElementById('btnSaveModal');
      btnSave.disabled = true;
      btnSave.textContent = "Salvando...";

      const { error } = await db
        .from('buses')
        .upsert({
          driver_id: driverId,
          plate: plate,
          model: model,
          enumeration: enumeration,
          policy: policy,
          updated_at: new Date().toISOString()
        }, { onConflict: 'driver_id' });

      btnSave.disabled = false;
      btnSave.textContent = "Salvar Ônibus";

      if (error) {
        showToast("Erro ao salvar: " + error.message, "error");
      } else {
        closeModal();
        showToast("Ônibus vinculado com sucesso!", "success");
        fetchDriversAndBuses();
      }
    });

    /* ── AUXILIARES (TOAST, LOGOUT, SANITIZAÇÃO) ── */
    let toastTimer;
    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      document.getElementById('toastIcon').className = type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-xmark';
      document.getElementById('toastMsg').textContent = msg;
      toast.className = `show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.className = ''; }, 3500);
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await db.auth.signOut(); window.location.href = 'login.html';
    });

    function escHtml(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.addEventListener('DOMContentLoaded', checkSession);
  })();
</script>
</body>
</html>
